name: Update NixOS Documentation References

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate references from official repos
        run: bash scripts/generate-references.sh

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet references/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          source references/.wiki-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add references/
          COMMIT_MSG="docs: update references (nix.dev ${nixdev_commit}, nixpkgs ${nixpkgs_commit})"
          git commit -m "$COMMIT_MSG"
          git push
